	<body class="width1">
		<div class="loader-box">
			<div class="hollowLoader">
				<div class="largeBox"></div>
				<div class="smallBox"></div>
			</div>
		</div>

		<section class="blogs-section">
			<div class="mb-3 p-sm-6 container width2" id="blogid">
				<!-- <h3 class="pt-5 pb-5 font-weight-bold heading-blog" style="font-family: 'Titillium Web', sans-serif;">Recent <span> Blogs </span></h3> -->
				<div
					id="retainable-rss-embed"
					data-rss="https://medium.com/feed/techequilla"
					data-maxcols="1"
					data-layout="grid"
					data-poststyle="external"
					data-readmore="Read more"
					data-buttonclass="btn blog-btn p-3o"
					data-offset="-100"
				></div>
			</div>
		</section>

		<section class="google-reviews-section">
			<div class="container width2" id="reviewsid">
				<div class="google-reviews-label-box">Google Reviews</div>
				<div class="google-reviews-summary" id="googleReviewsSummary"></div>
			</div>
		</section>

		<section class="all-reviews-section">
			<div class="container width2" id="allReviewsContainer">
				<div class="testimonials-layout">
					<div class="testimonials-heading">
						<h2>Students<br>Testimonials</h2>
					</div>
					<div class="testimonials-right">
						<div class="google-reviews-state" id="googleReviewsState">Loading reviews...</div>
						<div class="google-reviews-grid" id="googleReviewsList"></div>
					</div>
				</div>
			</div>
		</section>
		<!-- Footer -->

		<script>
			$('.btn').mousedown(function (e) {
				e.preventDefault();
			});
		</script>
